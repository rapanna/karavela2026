name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H virgo.top-me.eu >> ~/.ssh/known_hosts
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ timekaraveladev@virgo.top-me.eu:/var/www/clients/client6/web71/home/timekaraveladev/web/wp-content/themes/karavela2026/
